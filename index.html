<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Roboto&family=Roboto+Mono&display=swap');

        :root{
            --branco: white;
            --cor-de-fundo: #00162E;
            --fundo-senha: #00244D;
            --fundo-texto: #001E40;
            --borda: #0075FF;
            --roboto: 'Roboto', sans-serif;
            --roboto-mono: 'Roboto Mono', monospace;
        }

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-weight: 400;
        }

        body{
            color: var(--branco);
            background-color: var(--cor-de-fundo);
            font-family: var(--roboto);
        }

        .conteudo{
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .conteudo-titulo{
            text-align: center;
            margin-top: 60px;
        }

        .titulo-principal{
            font-family: var(--roboto-mono);
            font-size: 32px;
            margin-top: 10px;
        }

        .titulo-secundario{
            font-size: 22px;
            margin-top: 10px;
        }

        .conteudo-senha{
            margin-top: 50px;
            background: var(--fundo-senha);
            padding: 24px;
            border-bottom: 6px solid var(--borda);
            border-radius: 10px;
        }

        #campo-senha{
            background-color: var(--fundo-senha);
            border: none;
            color: var(--branco);
            font-family: var(--roboto-mono);
            font-size: 32px;
            width: 100%;
            margin-top: 10px;
        }

        #campo-senha:focus{
            outline: none;
        }

        .botao-gerar{
            margin-top: 20px;
            background-color: var(--borda);
            color: var(--branco);
            border: none;
            padding: 16px 24px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .botao-gerar:hover{
            background-color: #005fd1;
            transform: scale(1.05);
        }

        .parametro{
            background-color: var(--fundo-texto);
            border: 2px solid var(--borda);
            margin-top: 32px;
            padding: 24px;
            border-radius: 10px;
        }

        .parametro-titulo{
            font-family: var(--roboto-mono);
            font-size: 28px;
            margin-bottom: 20px;
        }

        .parametro-coluna__senha{
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .parametro-senha{
            width: 100%;
        }

        .parametro-senha__titulo{
            font-size: 24px;
            margin-bottom: 15px;
        }

        .parametro-senha-botoes{
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .parametro-senha__botao{
            background-color: var(--fundo-texto);
            color: var(--branco);
            border: 2px solid var(--borda);
            padding: 16px 22px;
            font-size: 24px;
            cursor: pointer;
        }

        .parametro-senha__texto{
            padding: 16px 24px;
            border-top: 2px solid var(--borda);
            border-bottom: 2px solid var(--borda);
            font-size: 24px;
        }

        .parametro-senha-checkbox{
            margin-top: 10px;
        }

        .checkbox{
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        label{
            font-size: 20px;
            margin-left: 8px;
        }

        .barra{
            background-color: var(--fundo-senha);
            height: 30px;
            width: 100%;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }

        .forca{
            height: 30px;
            width: 25%;
            background-color: #E71B32;
            transition: 0.3s;
        }

        .parametro-senha-textos{
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .entropia{
            margin-top: 15px;
            font-size: 18px;
        }

        .tempo-quebra{
            margin-top: 10px;
            font-size: 18px;
            color: #00FF85;
        }

        @media screen and (min-width: 768px) {

            .parametro-coluna__senha{
                flex-direction: row;
                justify-content: space-between;
            }

            .parametro-senha{
                width: 30%;
            }

        }

    </style>
</head>

<body>

    <section class="conteudo">

        <div class="conteudo-titulo">
            <h2 class="titulo-principal">Gerador de Senhas</h2>

            <h3 class="titulo-secundario">
                Gere instantaneamente uma senha aleatória e segura
            </h3>
        </div>

        <div class="conteudo-senha">

            <label for="campo-senha">Senha</label>

            <input
                name="senha"
                type="text"
                id="campo-senha"
                readonly
            >

            <button id="gerar-senha" class="botao-gerar">
                Gerar nova senha
            </button>

        </div>

        <div class="parametro">

            <h3 class="parametro-titulo">
                Personalize sua senha
            </h3>

            <div class="parametro-coluna__senha">

                <div class="parametro-senha">

                    <h4 class="parametro-senha__titulo">
                        Número de caracteres
                    </h4>

                    <div class="parametro-senha-botoes">

                        <button id="diminuir" class="parametro-senha__botao">
                            -
                        </button>

                        <p id="numero-caracteres" class="parametro-senha__texto">
                            12
                        </p>

                        <button id="aumentar" class="parametro-senha__botao">
                            +
                        </button>

                    </div>

                </div>

                <div class="parametro-senha">

                    <h4 class="parametro-senha__titulo">
                        Características da senha
                    </h4>

                    <div class="parametro-senha-checkbox">
                        <input checked id="maiusculo" type="checkbox" class="checkbox">
                        <label for="maiusculo">Letras maiúsculas</label>
                    </div>

                    <div class="parametro-senha-checkbox">
                        <input checked id="minusculo" type="checkbox" class="checkbox">
                        <label for="minusculo">Letras minúsculas</label>
                    </div>

                    <div class="parametro-senha-checkbox">
                        <input checked id="numero" type="checkbox" class="checkbox">
                        <label for="numero">Números</label>
                    </div>

                    <div class="parametro-senha-checkbox">
                        <input id="simbolo" type="checkbox" class="checkbox">
                        <label for="simbolo">Símbolos</label>
                    </div>

                </div>

                <div class="parametro-senha">

                    <h4 class="parametro-senha__titulo">
                        Força da senha
                    </h4>

                    <div class="barra">
                        <div id="forca" class="forca"></div>
                    </div>

                    <div class="parametro-senha-textos">
                        <p>Fraca</p>
                        <p>Média</p>
                        <p>Forte</p>
                    </div>

                    <p id="texto-forca" class="entropia"></p>

                    <p id="tempo-quebra" class="tempo-quebra"></p>

                </div>

            </div>

        </div>

    </section>

    <script>

        const campoSenha = document.getElementById("campo-senha");
        const botaoGerar = document.getElementById("gerar-senha");

        const aumentar = document.getElementById("aumentar");
        const diminuir = document.getElementById("diminuir");

        const numeroCaracteres = document.getElementById("numero-caracteres");

        const maiusculo = document.getElementById("maiusculo");
        const minusculo = document.getElementById("minusculo");
        const numero = document.getElementById("numero");
        const simbolo = document.getElementById("simbolo");

        const barraForca = document.getElementById("forca");
        const textoForca = document.getElementById("texto-forca");

        let tamanhoSenha = 12;

        aumentar.addEventListener("click", () => {

            tamanhoSenha++;

            numeroCaracteres.textContent = tamanhoSenha;

        });

        diminuir.addEventListener("click", () => {

            if(tamanhoSenha > 4){

                tamanhoSenha--;

                numeroCaracteres.textContent = tamanhoSenha;

            }

        });

        function gerarSenha() {

            let caracteres = "";

            if(maiusculo.checked){
                caracteres += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            }

            if(minusculo.checked){
                caracteres += "abcdefghijklmnopqrstuvwxyz";
            }

            if(numero.checked){
                caracteres += "0123456789";
            }

            if(simbolo.checked){
                caracteres += "!@#$%&*";
            }

            if(caracteres === ""){

                alert("Selecione pelo menos uma opção!");

                return;
            }

            let senha = "";

            for(let i = 0; i < tamanhoSenha; i++){

                const indice = Math.floor(Math.random() * caracteres.length);

                senha += caracteres[indice];

            }

            campoSenha.value = senha;

            verificarForca();

        }

        function verificarForca(){

            const tempoQuebra =
                document.getElementById("tempo-quebra");

            if(tamanhoSenha <= 6){

                barraForca.style.width = "25%";

                barraForca.style.background = "#E71B32";

                textoForca.textContent = "Senha Fraca";

                tempoQuebra.textContent =
                    "Um computador descobriria essa senha em poucos segundos.";

            }

            else if(tamanhoSenha <= 10){

                barraForca.style.width = "50%";

                barraForca.style.background = "#FAF408";

                textoForca.textContent = "Senha Média";

                tempoQuebra.textContent =
                    "Um computador levaria algumas horas ou dias para descobrir.";

            }

            else{

                barraForca.style.width = "100%";

                barraForca.style.background = "#00FF85";

                textoForca.textContent = "Senha Forte";

                tempoQuebra.textContent =
                    "Um computador levaria muitos anos para descobrir essa senha.";

            }

        }

        botaoGerar.addEventListener("click", gerarSenha);

        gerarSenha();

    </script>

</body>
</html>
